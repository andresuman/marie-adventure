<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Evita cache agressivo durante desenvolvimento/local -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Evita o request automático de /favicon.ico (e o 404 no server local) -->
    <link rel="icon" href="data:,">
    <meta name="description" content="Jogo 2D de plataforma comemorativo dos 100 anos da visita de Marie Curie a Águas de Lindóia (1926–2026). Jogue no navegador, sem instalação.">
    <meta property="og:title" content="A Aventura de Marie Curie">
    <meta property="og:description" content="Jogo 2D comemorativo dos 100 anos da visita de Marie Curie a Águas de Lindóia. Jogue no navegador!">
    <meta property="og:url" content="https://andresuman.github.io/marie-adventure/">
    <meta property="og:type" content="website">
    <title>A Aventura de Marie Curie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            width: 100%;
            height: 100vh;                  /* fallback genérico */
            height: -webkit-fill-available; /* iOS Safari < 15.4 */
            height: 100dvh;                 /* iOS Safari 15.4+ e Chrome 108+ */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }

    </style>
</head>
<body>
    <script>
        // Notifica o Phaser para recalcular a escala após rotação ou mudança de viewport.
        (function () {
            function notifyPhaser() {
                window.dispatchEvent(new Event('resize'));
            }
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', notifyPhaser, { passive: true });
            }
            window.addEventListener('orientationchange', function () {
                setTimeout(notifyPhaser, 300);
            }, { passive: true });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <!-- Desbloqueia WebAudio no primeiro gesto do usuário (mobile) -->
    <script src="audio/AudioUnlock.js?v=20260228"></script>
    <!-- Gerenciador e tema musical (WebAudio puro) -->
    <script src="audio/MusicManager.js?v=20260228"></script>
    <script src="audio/GameTheme.js?v=20260301"></script>
    <!-- cache-bust para garantir refresh quando mexer nos arquivos -->
    <script src="scenes/BootScene.js?v=20260301"></script>
    <script src="scenes/TitleScene.js?v=20260301"></script>
    <script src="scenes/GameScene.js?v=20260301"></script>
    <script src="scenes/HUDScene.js?v=20260301"></script>
    <script src="scenes/GameOverScene.js?v=20260301"></script>
    <script src="scenes/WinScene.js?v=20260301"></script>
    <script src="game.js?v=20260301"></script>
</body>
</html>
