<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Evita cache agressivo durante desenvolvimento/local -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Evita o request automático de /favicon.ico (e o 404 no server local) -->
    <link rel="icon" href="data:,">
    <title>A Aventura de Marie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            /* Ajuda no mobile: evita scroll/zoom gestual roubando o multi-touch */
            touch-action: none;
        }
    </style>
</head>
<body>
    <script>
        // Em mobile, 100vh pode incluir/excluir a barra do navegador dependendo do estado.
        // Esse ajuste usa a altura real visível e evita o canvas ficar "cortado" no landscape.
        (function () {
            function setVh() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', setVh, { passive: true });
            window.addEventListener('orientationchange', setVh, { passive: true });
            setVh();

            // Aplica a variável no body/html (sem depender de CSS moderno como 100dvh).
            const style = document.createElement('style');
            style.textContent = `html, body { height: calc(var(--vh, 1vh) * 100); }`;
            document.head.appendChild(style);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <!-- cache-bust para garantir refresh quando mexer nos arquivos -->
    <script src="scenes/BootScene.js?v=20260228"></script>
    <script src="scenes/GameScene.js?v=20260228"></script>
    <script src="scenes/HUDScene.js?v=20260228"></script>
    <script src="scenes/GameOverScene.js?v=20260228"></script>
    <script src="game.js?v=20260228"></script>
</body>
</html>
