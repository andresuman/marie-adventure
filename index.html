<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Evita cache agressivo durante desenvolvimento/local -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Evita o request automático de /favicon.ico (e o 404 no server local) -->
    <link rel="icon" href="data:,">
    <title>A Aventura de Marie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            width: 100%;
            height: 100vh;                  /* fallback genérico */
            height: -webkit-fill-available; /* iOS Safari < 15.4 */
            height: 100dvh;                 /* iOS Safari 15.4+ e Chrome 108+ */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }

        /* ── Overlay "vire o celular" ── */
        #portrait-msg {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000a22;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            color: #fff;
            font-family: monospace;
            text-align: center;
            padding: 24px;
        }
        #portrait-msg .icon {
            font-size: 56px;
            animation: spin 1.8s ease-in-out infinite alternate;
        }
        #portrait-msg p {
            font-size: 14px;
            line-height: 1.6;
            color: #aaddff;
        }
        @keyframes spin {
            from { transform: rotate(-90deg); }
            to   { transform: rotate(0deg);  }
        }
        @media (orientation: portrait) {
            #portrait-msg { display: flex; }
        }
    </style>
</head>
<body>
    <div id="portrait-msg">
        <div class="icon">📱</div>
        <p>Vire o celular para<br><strong>modo paisagem</strong><br>para jogar!</p>
    </div>
    <script>
        // Notifica o Phaser para recalcular a escala após rotação ou mudança de viewport.
        (function () {
            function notifyPhaser() {
                window.dispatchEvent(new Event('resize'));
            }
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', notifyPhaser, { passive: true });
            }
            window.addEventListener('orientationchange', function () {
                setTimeout(notifyPhaser, 300);
            }, { passive: true });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <!-- cache-bust para garantir refresh quando mexer nos arquivos -->
    <script src="scenes/BootScene.js?v=20260228"></script>
    <script src="scenes/GameScene.js?v=20260228"></script>
    <script src="scenes/HUDScene.js?v=20260228"></script>
    <script src="scenes/GameOverScene.js?v=20260228"></script>
    <script src="scenes/WinScene.js?v=20260228"></script>
    <script src="game.js?v=20260228"></script>
</body>
</html>
